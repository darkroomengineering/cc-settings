name: upstream-sync

# Daily scan of Claude Code upstream. When `src/upstream/scan.ts --open-pr`
# detects a new npm version of @anthropic-ai/claude-code, it writes an
# updated upstream/claude-code-manifest.json and opens a labeled PR.

on:
  schedule:
    # Daily 09:00 UTC. Claude Code usually ships patch releases mid-week;
    # daily is tight enough to catch drift within 24h of release.
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history to push a new branch.
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.1.30"
      - run: bun install --frozen-lockfile
      - name: Scan upstream (dry-run summary)
        run: bun src/upstream/scan.ts
      - name: Open PR on drift
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun src/upstream/scan.ts --open-pr
