name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.1.30"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.1.30"
      - run: bun install --frozen-lockfile
      - run: bun test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.1.30"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run lint:skills
      - run: bun run lint:agents
      - run: bun run lint:profiles
      - name: lint:knowledge (fixture dir, not the real team-knowledge repo)
        # No team-knowledge repo checkout lives in this CI job, so this lints
        # tests/fixtures/knowledge/ instead — a small schema-valid note kept
        # in-repo so the linting logic (schema checks, name/filename
        # mismatch, supersedes-unknown warning) actually runs in CI rather
        # than short-circuiting on "no directory specified".
        run: bun run lint:knowledge tests/fixtures/knowledge

  schemas:
    # Fails if `bun run schemas:emit` would produce a diff — enforces that the
    # committed JSON Schemas match the zod sources.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.1.30"
      - run: bun install --frozen-lockfile
      - run: bun run schemas:emit
      - run: git diff --exit-code schemas/

  upstream-scan:
    # Dry-run in CI so any drift surfaces in the PR logs. Not a gate, and not
    # automated beyond this — run `/cc sync` by hand to triage the changelog
    # and land a bump.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.1.30"
      - run: bun install --frozen-lockfile
      - run: bun run upstream:scan

  install-e2e:
    # Dedicated job for the E2E install tests so install failures are
    # surfaced as their own PR check (otherwise they're buried in the
    # `test` job among 240+ other tests). Runs the same tests as `test`
    # but only the install-e2e file, with the same matrix.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.1.30"
      - run: bun install --frozen-lockfile
      - name: Run install E2E tests (HOME=tmpdir, CC_SKIP_DEPS=1)
        run: bun test tests/install-e2e.test.ts tests/golden-migrations.test.ts

  install-bash-bootstrap:
    # Smoke test setup.sh's bootstrap path (the bash wrapper that ensures
    # Bun is installed before exec'ing bun src/setup.ts). --dry-run prints
    # the planned actions without writing — enough to validate setup.sh
    # parses and dispatches correctly.
    #
    # Linux + macOS only. Windows goes through setup.ps1, smoke-tested by
    # the install-ps1-bootstrap job below.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.1.30"
      - run: bun install --frozen-lockfile
      - name: bash setup.sh --dry-run
        run: bash setup.sh --dry-run
        env:
          # Use the runner's HOME so we don't accidentally pollute it with
          # cc-settings artifacts (--dry-run wouldn't, but defense-in-depth).
          CC_SKIP_DEPS: "1"

  install-ps1-bootstrap:
    # Smoke test setup.ps1's bootstrap path (PowerShell mirror of setup.sh):
    # validates it resolves the repo dir, finds Bun, installs deps, and
    # dispatches to src/setup.ts. --dry-run prints planned actions only.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.1.30"
      - run: bun install --frozen-lockfile
      - name: setup.ps1 --dry-run (pwsh)
        run: .\setup.ps1 --dry-run
        env:
          CC_SKIP_DEPS: "1"
      - name: setup.ps1 --dry-run (Windows PowerShell 5.1)
        # The default shell on most Windows boxes is still powershell.exe —
        # run the bootstrap there too so PS-5.1-only breakage gets caught.
        run: powershell -ExecutionPolicy Bypass -File setup.ps1 --dry-run
        shell: cmd
        env:
          CC_SKIP_DEPS: "1"
